name: Check Runner IP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-ip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Runner IP and Country
        run: |
          echo "=== GitHub Runner Info ==="
          
          sudo apt-get update -qq > /dev/null
          sudo apt-get install -y jq > /dev/null
          
          RESPONSE=$(curl -s https://ipinfo.io)
          
          echo "IP Address   : $(echo $RESPONSE | jq -r '.ip')"
          echo "Country      : $(echo $RESPONSE | jq -r '.country')"
          echo "City         : $(echo $RESPONSE | jq -r '.city')"
          echo "Region       : $(echo $RESPONSE | jq -r '.region')"
          echo "Org          : $(echo $RESPONSE | jq -r '.org')"
